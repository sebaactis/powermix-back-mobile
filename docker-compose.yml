version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: powermix-db-dev
    environment:
      POSTGRES_DB: powermix
      POSTGRES_USER: powermix
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U powermix -d powermix"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
